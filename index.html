const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
function highlightText(text, keyword){
  const src = String(text ?? ""), q = String(keyword ?? "").trim();
  if(!q) return escapeHtml(src);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escapeHtml(src).replace(new RegExp(esc, "gi"), m => `<mark>${m}</mark>`);

function formatResetPasswordError(error){
  const code = String(error?.code || "");
  if(code === "auth/invalid-email") return "Email 格式不正確，請重新確認。";
  if(code === "auth/missing-email") return "請先輸入 Email。";
  if(code === "auth/too-many-requests") return "此功能操作過於頻繁，請稍後再試。";
  if(code === "auth/network-request-failed") return "網路連線異常，請確認網路後再試。";
  if(code === "auth/user-not-found") return "查無此登入帳號，請確認 Email 是否正確。";
  if(code === "auth/unauthorized-continue-uri") return "重設密碼網址未被 Firebase 授權，請到 Authentication > Settings > Authorized domains 加入目前網域。";
  if(code === "auth/invalid-continue-uri") return "重設密碼導向網址設定錯誤。";
  return `寄送失敗：${code || "unknown"}${error?.message ? "｜" + error.message : ""}`;
}

function formatStorageError(error){
  const code = String(error?.code || "");
  const msg = String(error?.message || "");
  if(code.includes("storage/unauthorized")) return "沒有 Storage 寫入權限（storage/unauthorized）";
  if(code.includes("storage/unauthenticated")) return "目前登入狀態無法通過 Storage 驗證（storage/unauthenticated）";
  if(code.includes("storage/object-not-found")) return "檔案路徑不存在（storage/object-not-found）";
  if(code.includes("storage/quota-exceeded")) return "Storage 額度已滿（storage/quota-exceeded）";
  if(code.includes("storage/retry-limit-exceeded")) return "上傳重試次數超過限制（storage/retry-limit-exceeded）";
  if(code.includes("storage/unknown")) return `Storage 未知錯誤（storage/unknown）${msg ? "：" + msg : ""}`;
  return `${code || "unknown"}${msg ? "：" + msg : ""}`;
}

async function uploadHandverPhoto(file){  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
  const safeExt = ext.replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `handover_photos/${effectiveStore()}/${state.selectedDate}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;

  let lastError = null;  for(const target of storageInstances){
    try{
      const photoRef = storageRef(target.instance, path);
      await uploadBytes(photoRef, file);      const url = await getDownloadURL(photoRef);      return url;
    }catch(error){
      console.error("Storage upload failed:", target.bucket, error);
      lastError = error;
    }
  }

  const fallbackRef = storageRef(storage, path);
  try{
    await uploadBytes(fallbackRef, file);    const url = await getDownloadURL(fallbackRef);    return url;
  }catch(error){
    console.error("Default storage upload failed:", error);
    lastError = error || lastError;
  }

  throw lastError || new Error("storage upload failed");
}

const normalizeStoreName = (id, name) => {
  const fallback = defaultStoreNames[id] || `${id}店`;
  if(!name || name === `${id}店`) return fallback;
  return name;
};
const visibleStores = () => canViewAllStores() ? state.stores : state.stores.filter(s => s.id === profileStoreId(state.profile));

const canManageStores = () => normalizeRole(state.profile?.role) === "admin";
const formatDateValue = value => {
  if(!value) return "";
  const d = value instanceof Date ? value : new Date(value);
  if(Number.isNaN(d.getTime())) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const announcementReadByCurrentUser = announcement => Array.isArray(announcement?.readBy) && currentUid() ? announcement.readBy.includes(currentUid()) : false;
const formatAnnouncementDate = announcement => {
  const createdAt = announcement?.createdAt;
  if(createdAt?.seconds) return formatDateValue(createdAt.seconds * 1000);
  if(typeof createdAt?.toDate === "function") return formatDateValue(createdAt.toDate());
  return "";
};

function dashboardRows(){
  return visibleStores().map(store => {
    const list = state.handovers.filter(h => h.date===state.selectedDate && h.storeId===store.id);
    const total = list.length;
    const doneItems = list.filter(i => i.status==="done");
    const inProgressItems = list.filter(i => i.status==="in_progress");
    const pendingItems = list.filter(i => i.status==="pending");
    const followupItems = list.filter(i => i.status==="pending_followup");
    const done = doneItems.length;
    const inProgress = inProgressItems.length;
    const pending = pendingItems.length;
    const followup = followupItems.length;
    const abnormal = pending + followup;
    const doneUnread = doneItems.filter(i => !itemReadByCurrentUser(i)).length;
    const inProgressUnread = inProgressItems.filter(i => !itemReadByCurrentUser(i)).length;
    const pendingUnread = pendingItems.filter(i => !itemReadByCurrentUser(i)).length;
    const followupUnread = followupItems.filter(i => !itemReadByCurrentUser(i)).length;
    return {...store,total,done,inProgress,pending,followup,abnormal,doneUnread,inProgressUnread,pendingUnread,followupUnread,progress: total?Math.round(done/total*100):0};
  });
}
function totals(){
  const rows = dashboardRows();
  return {
    totalItems: rows.reduce((a,b)=>a+b.total,0),
    totalDone: rows.reduce((a,b)=>a+b.done,0),
    totalAbnormal: rows.reduce((a,b)=>a+b.abnormal,0),
    avgProgress: rows.length ? Math.round(rows.reduce((a,b)=>a+b.progress,0)/rows.length) : 0
  };
}
const currentItems = () => state.handovers.filter(h => h.date===state.selectedDate && (!state.selectedShift || h.shift===state.selectedShift) && h.storeId===effectiveStore());
const filteredItems = () => {
  const q = state.searchText.trim().toLowerCase();
  return currentItems().filter(i => {
    const matchStatus = !state.formsStatusFilter || i.status===state.formsStatusFilter;
    const matchText = !q || String(i.content).toLowerCase().includes(q) || String(i.category).toLowerCase().includes(q);
    const matchRead = state.formsReadFilter==="all" ? true : state.formsReadFilter==="read" ? itemReadByCurrentUser(i) : !itemReadByCurrentUser(i);
    return matchStatus && matchText && matchRead;
  });
};

const itemReadByCurrentUser = item => Array.isArray(item?.readBy) && currentUid() ? item.readBy.includes(currentUid()) : false;

function globalResults(){
  const q = state.searchText.trim().toLowerCase();
  if(!q) return {stores:[],items:[],announcements:[],users:[]};
  const stores = visibleStores().filter(s => s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  const visibleStoreIds = new Set(visibleStores().map(s => s.id));
  const items = state.handovers
    .filter(h => visibleStoreIds.has(h.storeId))
    .filter(i =>
      String(i.content||"").toLowerCase().includes(q) ||
      String(i.category||"").toLowerCase().includes(q) ||
      String(i.createdByName||"").toLowerCase().includes(q) ||
      String(i.date||"").toLowerCase().includes(q) ||
      String(i.shift||"").toLowerCase().includes(q) ||
      String(i.storeId||"").toLowerCase().includes(q)
    )
    .map(i => {
      const store = state.stores.find(s => s.id===i.storeId);
      return {...i,storeName:store?.name||`${i.storeId}店`};
    })
    .sort((a,b) => `${b.date||""}${b.shift||""}`.localeCompare(`${a.date||""}${a.shift||""}`));
  const announcements = state.announcements.filter(a => {
    const canView = !a.targetStoreId || a.targetStoreId===effectiveStore() || canViewAllStores();
    return canView && (String(a.title).toLowerCase().includes(q) || String(a.content).toLowerCase().includes(q) || String(a.createdByName||"").toLowerCase().includes(q));
  });
  const users = canManageUsers() ? state.users.filter(u =>
    String(u.username||u.email||"").toLowerCase().includes(q) ||
    String(u.name||"").toLowerCase().includes(q) ||
    String(u.role||"").toLowerCase().includes(q) ||
    String(u.storeId||u.store||"").toLowerCase().includes(q)
  ) : [];
  return {stores,items,announcements,users};
}

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.pendingApproval){
      await signOut(auth);
      setState({loginError:"此帳號正在等待管理員審核。", profile:null, currentUser:null});
      return;
    }
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    setState({ profile:{id:user.uid,...data,role:normalizeRole(data.role)} });
    subscribeData();
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"staff", storeId:firstUser?null:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  setState({ profile:{id:user.uid,...profile}, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為員工 寶慶。" });
  subscribeData();
}
function subscribeData(){
  clearSubs();
  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => setState({handovers:snap.docs.map(d=>({id:d.id,...d.data()}))})));
  unsubscribers.push(onSnapshot(collection(db,"announcements"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({ announcements:rows, lastAnnouncement:rows[0]||null, showAnnouncementModal:false });
  }));
  unsubscribers.push(onSnapshot(collection(db,"users"), snap => setState({users:snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)}))})));
  unsubscribers.push(onSnapshot(collection(db,"applications"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({applications:rows});
  }));
  unsubscribers.push(onSnapshot(collection(db,"stores"), async snap => {
    if(snap.empty){
      for(const s of storesSeed){
        await setDoc(doc(db,"stores",s.id), s, {merge:true});
      }
      setState({stores:storesSeed, storeDrafts:Object.fromEntries(storesSeed.map(s=>[s.id,s.name]))});
      return;
    }
    const rows = snap.docs.map(d => ({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    setState({stores:rows, storeDrafts:Object.fromEntries(rows.map(s=>[s.id,normalizeStoreName(s.id, s.name)]))});
  }));
}

    const password = String(state.applicationPassword || "");

    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db,"users",cred.user.uid), {
      email,
      username:email,
      name,
      role:"staff",
      storeId:"A",
      active:false,
      pendingApproval:true,

    }, {merge:true});
    await setDoc(doc(db,"applications",cred.user.uid), {

      email,
      name,
      status:"pending",
      reviewNote:"",
      reviewedByUid:null,
      reviewedByName:"",
      createdAt:serverTimestamp(),
      updatedAt:serverTimestamp()
    }, {merge:true});
    await signOut(auth);
    setState({
      applicationName:"",
      applicationEmail:"",
      applicationPassword:"",
      applicationSuccess:"申請已送出，請等待管理員審核。",
      applicationError:"",
      currentUser:null,
      profile:null
    });
  }catch(e){
    console.error(e);
    const code = String(e?.code || "");
    if(code.includes("auth/email-already-in-use")){
      setState({applicationError:"此 E-mail 已存在，請直接登入或聯絡管理員。"});
    }else{
      setState({applicationError:"申請送出失敗，請確認 E-mail 格式與密碼至少 6 碼。"});
    }
  }
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) return alert("找不到申請資料");
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

async function addStore(){

  const idInput = document.getElementById("new_store_id");
  const nameInput = document.getElementById("new_store_name");
  const rawId = String(idInput?.value || "").trim().toUpperCase();

  if(!/^[A-Z0-9_-]{1,12}$/.test(rawId)) return alert("店家代號限英文大寫、數字、-、_，最多 12 碼");

  alert("店家已新增");
}
async function saveStore(id){
  if(!canManageStores()) return alert("只有管理員可修改店家資料");
  const idInput = document.getElementById(`store_id_${id}`);
  const nameInput = document.getElementById(`store_name_${id}`);
  const newId = String(idInput?.value || "").trim().toUpperCase();
  const newName = String(nameInput?.value || "").trim();
  if(!newId) return alert("請輸入店家代號");
  if(!/^[A-Z0-9_-]{1,12}$/.test(newId)) return alert("店家代號限英文大寫、數字、-、_，最多 12 碼");
  if(!newName) return alert("請輸入店別名稱");
  if(newId !== id && state.stores.some(s => String(s.id).toUpperCase()===newId)) return alert("此店家代號已存在");

  if(newId === id){
    await setDoc(doc(db,"stores",id),{id,name:newName},{merge:true});
    alert("店家資料已更新");
    return;
  }

  if(!confirm(`確定要把店家代號從 ${id} 改成 ${newId} 嗎？
天氣會同步更新交接資料、帳號店別與公告店別。`)) return;

  const oldStore = state.stores.find(s => s.id===id);
  await setDoc(doc(db,"stores",newId), {
    ...(oldStore || {}),
    id:newId,
    name:newName,
    updatedAt:serverTimestamp()
  }, {merge:true});

  const handoverSnap = await getDocs(collection(db,"handovers"));
  for(const row of handoverSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"handovers",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const userSnap = await getDocs(collection(db,"users"));
  for(const row of userSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"users",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const announcementSnap = await getDocs(collection(db,"announcements"));
  for(const row of announcementSnap.docs){
    const data = row.data();
    if(String(data.targetStoreId || "") === id){
      await updateDoc(doc(db,"announcements",row.id), {targetStoreId:newId, updatedAt:serverTimestamp()});
    }
  }

  await deleteDoc(doc(db,"stores",id));

  const patch = {selectedStore:newId, historyStore:newId};
  if(state.profile && String(state.profile.storeId || "") === id){
    state.profile.storeId = newId;
  }
  setState(patch);

}

  <div class="card section">
    <h2>店家管理</h2>
    <div class="okbox" style="margin-bottom:12px">管理員可新增店家，也可修改現有店家代號與店名。若變更店家代號，天氣會同步更新交接資料、帳號店別與公告店別。</div>
    <div class="item" style="margin-bottom:12px">
      <div class="store-manage-row">
        <input id="new_store_id" placeholder="店家代號，例如 E">
        <input id="new_store_name" placeholder="店家名稱，例如 忠孝">
        <button class="btn primary" onclick="addStoreFromUI()">新增店家</button>
      </div>
    </div>
    <div class="list">
      ${state.stores.map(s => `
        <div class="item">
          <div class="store-manage-row" style="grid-template-columns:120px minmax(0,1fr) 140px">
            <input id="store_id_${s.id}" value="${escapeHtml(s.id)}" placeholder="店家代號">
            <input id="store_name_${s.id}" value="${escapeHtml(s.name)}" placeholder="請輸入店名">
            <button class="btn primary" onclick="saveStoreFromUI('${s.id}')">儲存店家</button>
          </div>
        </div>`).join("")}
    </div>
  </div>` : ""}
  <div class="card section">
    <table class="table account-table">
      <thead><tr><th class="col-account">帳號</th><th class="col-name">姓名</th><th class="col-email">Email</th><th class="col-status">狀態</th><th class="col-role">角色</th><th class="col-store">店別</th><th class="col-permission">目前權限</th><th class="col-password">密碼</th><th class="col-actions">動作</th></tr></thead>
      <tbody>
        ${state.users.map(u => {
          const role = normalizeRole(u.role);
          const disabled = u.active===false ? 'disabled' : '';
          const selfDisabled = state.currentUser && u.id===state.currentUser.uid ? 'disabled' : '';
          const email = String(u.email || u.username || "");
          const storeText = ["admin","general_manager"].includes(role) ? "全店" : ((state.stores.find(s => s.id===String(u.storeId||u.store||''))?.name) || ((u.storeId||u.store) ? `${u.storeId||u.store}店` : "未設定"));
          return `
          <tr>
            <td data-label="帳號">${escapeHtml(u.username||u.email||"-")}</td>
            <td data-label="姓名"><input id="name_${u.id}" value="${escapeHtml(u.name||"")}" placeholder="請輸入姓名" ${disabled}></td>
            <td data-label="Email">${escapeHtml(email||"-")}</td>
            <td data-label="狀態">${u.active===false?'<span class="chip warn">已停用</span>':'<span class="chip ok">正常</span>'}</td>
            <td data-label="角色">
              <select id="role_${u.id}" ${disabled}>
                <option value="admin" ${role==="admin"?"selected":""}>管理員</option>
                <option value="general_manager" ${role==="general_manager"?"selected":""}>店長</option>
                <option value="store_supervisor" ${role==="store_supervisor"?"selected":""}>店主管</option>
                <option value="staff" ${role==="staff"?"selected":""}>員工</option>
              </select>
            </td>
            <td data-label="店別"><select id="store_${u.id}" ${disabled}><option value="">-</option>${storeOptionsHtml(u.storeId||"")}</select></td>
            <td data-label="目前權限"><span class="chip info permission-chip">${escapeHtml(roleLabel(role))}<br>${escapeHtml(storeText)}</span></td>
            <td data-label="密碼">${email ? `<button class="btn warn" onclick="sendUserPasswordResetFromUI(${JSON.stringify(email).replace(/"/g,'&quot;')})" ${disabled}>寄重設信</button>` : `<span class="small muted">無 Email</span>`}</td>
            <td data-label="動作"><div class="account-actions"><button class="btn secondary" onclick="saveUserRoleFromUI('${u.id}')" ${disabled}>儲存</button><button class="btn danger" onclick="disableUserFromUI('${u.id}')" ${selfDisabled}>刪除</button></div></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}


function renderHistory(){
  const items = historyItems();
  return `
  <div class="card section">
    <h2>交接歷史查詢</h2>
    <div class="grid3">
      <input type="date" id="historyDate" value="${escapeHtml(state.historyDate)}">
      <select id="historyStore">${storeOptionsHtml(state.historyStore)}</select>
      <select id="historyShift"><option value="">全部班別</option>${optionHtml(shifts,state.historyShift)}</select>
    </div>
    <div style="height:12px"></div>
    <div class="row" style="gap:10px;flex-wrap:wrap">
      <span class="small muted">狀態篩選：</span>
      ${statusQuickLinks.map(s => `<button class="btn ${state.historyStatusFilter===s.key?"primary":"secondary"}" onclick="setHistoryStatusFilterFromUI('${s.key}')">${s.label}</button>`).join("")}
      <button class="btn secondary" onclick="clearHistoryStatusFilterFromUI()">清除篩選</button>
    </div>
    <div style="height:12px"></div>
    ${items.length ? `<div class="list">${items.map(i=>`
      <div class="item">
        <div class="chips">
          <span class="chip">${escapeHtml(i.date)}</span>
          <span class="chip">${escapeHtml(i.shift)}</span>
          <span class="chip">${escapeHtml(storeNameById(i.storeId))}</span>
          <span class="chip ${statuses[i.status]?.cls||"neutral"}">${escapeHtml(statuses[i.status]?.label||i.status)}</span>
        </div>
        <div style="margin-top:10px">${escapeHtml(i.content)}</div>
        ${i.photoUrl ? `<div style="margin-top:10px"><a href="${escapeHtml(i.photoUrl)}" target="_blank" rel="noopener noreferrer"><img src="${escapeHtml(i.photoUrl)}" alt="交接照片" style="width:120px;height:120px;object-fit:cover;border-radius:16px;border:1px solid var(--border)"></a></div>` : ``}
        <div class="small muted" style="margin-top:8px">${escapeHtml(i.createdByName||"")}</div>
        <div class="small muted" style="margin-top:8px">${itemReadByCurrentUser(i) ? "我已讀" : "我未讀"}</div>
      </div>`).join("")}</div>` : `<div class="empty">查無資料</div>`}
  </div>`;
}

function renderAnnouncementModal(){
  return "";
}
function renderEditModal(){
  if(!state.editingItemId) return "";
  return `
  <div class="modalbg" onclick="cancelEditItem()">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 style="margin-top:0">編輯交接內容</h2>
      <textarea id="editContent">${escapeHtml(state.editingItemContent)}</textarea>
      <div style="height:12px"></div>
      <div class="row">
        <button class="btn secondary" onclick="cancelEditItem()">取消</button>
        <button class="btn primary" onclick="saveEditItemFromUI()">儲存</button>
      </div>
    </div>
  </div>`;
}

function renderApp(root){
  const main = state.tab==="dashboard" ? renderDashboard()
    : state.tab==="forms" ? renderForms()
    : state.tab==="announcements" ? renderAnnouncements()
    : state.tab==="history" ? renderHistory()
    : renderUsers();

  root.innerHTML = `
  <div class="app">
    <div class="card topbar">
      <div>
        <div class="title">後台</div>
        <div class="sub">${escapeHtml(currentUserName())}｜${roleLabel(state.profile?.role)}｜${canViewAllStores()?"全店":escapeHtml(storeNameById(effectiveStore()))}｜${escapeHtml(state.selectedDate)}｜${escapeHtml(shiftLabel(state.selectedShift))}</div>
      </div>
      <div class="top-actions">
        <input class="w240" id="searchInput" placeholder="全站搜尋" value="${escapeHtml(state.searchText)}">
        <button class="btn secondary" onclick="resetFiltersFromUI()">重設篩選</button>
        <button class="btn primary" onclick="logoutFromUI()">登出</button>
      </div>
    </div>
    <div class="layout">
      <div class="card sidebar">
        <button class="navbtn ${state.tab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">總覽</button>
        <button class="navbtn ${state.tab==="forms"?"active":""}" onclick="switchTab('forms')">交接</button>
        <button class="navbtn ${state.tab==="announcements"?"active":""}" style="position:relative" onclick="switchTab('announcements')">公告${announcementBadgeCount()>0 ? `<span class="unread-badge">${announcementBadgeCount()}</span>` : ""}</button>
        <button class="navbtn ${state.tab==="history"?"active":""}" onclick="switchTab('history')">歷史</button>
        ${canManageUsers() ? `<button class="navbtn ${state.tab==="users"?"active":""}" onclick="switchTab('users')">帳號</button>` : ""}
        ${canManageUsers() ? `
        <div style="height:14px"></div>
        <div class="okbox small">
          版本 B4.5.5<br>
          ・只有管理員可見改版內容<br>
          ・角色中文顯示<br>
          ・角色儲存修正<br>
          ・帳號頁操作優化<br>
          ・歷史查詢<br>
          ・密碼重設<br>
          ・店名輸入不卡頓<br>
          ・店家管理 / 店家代號可編輯<br>
          ・修改店家代號會同步更新交接 / 帳號 / 公告<br>
          ・公告不跳窗，改側邊提醒<br>
          ・公告已讀鍵 / 發佈日期 / 寶慶店名同步<br>
          ・照片上傳功能修正完成<br>
          ・已讀改為不可逆 / 移除取消已讀<br>
          ・歷史日期預設當天<br>
          ・白畫面修正版<br>
          ・照片上傳 fallback / 錯誤訊息強化<br>
          ・忘記密碼中文化 / 金利品牌提示<br>
          ・重設後可返回網站首頁<br>
          ・首頁新增申請帳號區塊<br>
          ・申請名單 / 帳號審核流程<br>
          ・首頁加入一周天氣 / 自動更新 / 刷新按鈕 / 手機版同步優化<br>
          ・新增交接區塊加入日期選單<br>
          ・交接內容不保留前次輸入<br>
        </div>` : ""}
      </div>
      <div class="content">${main}</div>
    </div>
    ${renderAnnouncementModal()}
    ${renderEditModal()}
  </div>`;

  const search = document.getElementById("searchInput");
  if(search){
    search.addEventListener("compositionstart", () => {
      searchUI.isComposing = true;
    });
    search.addEventListener("compositionend", e => {
      searchUI.isComposing = false;
      searchUI.restore = true;
      searchUI.start = e.target.selectionStart;
      searchUI.end = e.target.selectionEnd;
      setState({searchText:e.target.value});
    });
    search.addEventListener("input", e => {
      if(searchUI.isComposing) return;
      searchUI.restore = true;
      searchUI.start = e.target.selectionStart;
      searchUI.end = e.target.selectionEnd;
      setState({searchText:e.target.value});
    });
  }
  const newDate = document.getElementById("newItemDate"); if(newDate) newDate.onchange = e => setState({newItemDate:e.target.value});
  const date = document.getElementById("dateInput"); if(date) date.onchange = e => setState({selectedDate:e.target.value});
  const shift = document.getElementById("shiftInput"); if(shift) shift.onchange = e => setState({selectedShift:e.target.value});
  const store = document.getElementById("storeInput"); if(store) store.onchange = e => setState({selectedStore:e.target.value});
  const hdate = document.getElementById("historyDate"); if(hdate) hdate.onchange = e => setState({historyDate:e.target.value});
  const hstore = document.getElementById("historyStore"); if(hstore) hstore.onchange = e => setState({historyStore:e.target.value});
  const hshift = document.getElementById("historyShift"); if(hshift) hshift.onchange = e => setState({historyShift:e.target.value});
  const nsh = document.getElementById("newShift"); if(nsh) nsh.onchange = e => state.newItemShift = e.target.value;
  const nc = document.getElementById("newCategory"); if(nc) nc.onchange = e => state.newItemCategory = e.target.value;
  const nct = document.getElementById("newContent"); if(nct){ nct.value = state.newItemContent || ""; nct.setAttribute("autocomplete","off"); nct.setAttribute("data-lpignore","true"); nct.oninput = e => state.newItemContent = e.target.value; }
  const ns = document.getElementById("newStatus"); if(ns) ns.onchange = e => state.newItemStatus = e.target.value;
  const np = document.getElementById("newPhoto"); if(np) np.onchange = e => selectPhotoFile((e.target.files||[])[0]);
  const at = document.getElementById("annTitle"); if(at) at.oninput = e => state.newAnnouncementTitle = e.target.value;
  const ac = document.getElementById("annContent"); if(ac) ac.oninput = e => state.newAnnouncementContent = e.target.value;
  const ast = document.getElementById("annStore"); if(ast) ast.onchange = e => state.newAnnouncementStore = e.target.value;
  state.users.forEach(u => {
    const roleEl = document.getElementById(`role_${u.id}`);
    const storeEl = document.getElementById(`store_${u.id}`);
    if(roleEl && storeEl){
      const syncStoreLock = () => {
        const role = normalizeRole(roleEl.value);
        if(["admin","general_manager"].includes(role)){
          storeEl.value = "";
          storeEl.disabled = true;
        }else{
          if(u.active!==false) storeEl.disabled = false;
          if(!storeEl.value) storeEl.value = u.storeId || "A";
        }
      };
      roleEl.onchange = syncStoreLock;
      syncStoreLock();
    }
  });
  const ec = document.getElementById("editContent"); if(ec) ec.oninput = e => state.editingItemContent = e.target.value;
  if(search && searchUI.restore && !searchUI.isComposing){
    const start = searchUI.start;
    const end = searchUI.end;
    searchUI.restore = false;
    requestAnimationFrame(() => {
      const s = document.getElementById("searchInput");
      if(!s) return;
      s.focus();
      try{
        if(start !== null && end !== null) s.setSelectionRange(start, end);
      }catch(err){}
    });
  }
}

function render(){
  const root = document.getElementById("root");
  if(!state.authReady){
    root.innerHTML = '<div class="app"><div class="card loading">讀取中...</div></div>';
    return;
  }
  if(!state.currentUser || !state.profile){ renderLogin(root); return; }
  renderApp(root);
}

window.loginFromUI = login;
window.registerFromUI = registerUser;
window.submitApplicationFromUI = submitApplication;
window.resetPasswordFromUI = resetPassword;
window.logoutFromUI = logout;
window.openStoreFromUI = openStore;
window.openStoreStatusFromUI = openStoreStatus;
window.openHistoryStatusFromUI = openHistoryStatus;
window.addItemFromUI = addItem;
window.clearNewPhotoFromUI = () => { resetPendingPhoto(); render(); };
window.updateStatusFromUI = updateStatus;
window.deleteItemFromUI = deleteItem;
window.toggleReadStatusFromUI = toggleReadStatus;
window.addAnnouncementFromUI = addAnnouncement;
window.deleteAnnouncementFromUI = deleteAnnouncement;
window.toggleAnnouncementReadStatusFromUI = toggleAnnouncementReadStatus;
window.switchTab = tab => setState({tab});
window.resetFiltersFromUI = () => setState({searchText:"",formsStatusFilter:"",historyStatusFilter:"",selectedDate:today(),selectedShift:"",selectedStore:canViewAllStores()?"A":(profileStoreId(state.profile)||"A")});
window.setFormsStatusFilterFromUI = status => setState({formsStatusFilter:status,tab:"forms"});
window.clearFormsStatusFilterFromUI = () => setState({formsStatusFilter:""});
window.setFormsReadFilterFromUI = value => setState({formsReadFilter:value});
window.setHistoryStatusFilterFromUI = status => setState({historyStatusFilter:status,tab:"history"});
window.clearHistoryStatusFilterFromUI = () => setState({historyStatusFilter:"",tab:"history"});
window.saveUserRoleFromUI = async uid => {
  const role = document.getElementById(`role_${uid}`).value;
  const storeId = document.getElementById(`store_${uid}`).value || null;
  const name = document.getElementById(`name_${uid}`)?.value || "";
  await saveUserRole(uid, role, storeId, name);
  alert("帳號資料已儲存");
};
window.closeAnnouncementModal = () => setState({showAnnouncementModal:false});
window.startEditItemFromUI = (id,content) => setState({editingItemId:id,editingItemContent:content});
window.cancelEditItem = () => setState({editingItemId:null,editingItemContent:""});
window.saveEditItemFromUI = saveEditItem;
window.disableUserFromUI = disableUser;
window.sendUserPasswordResetFromUI = sendUserPasswordReset;
window.addStoreFromUI = addStore;
window.saveStoreFromUI = saveStore;
window.reviewApplicationFromUI = reviewApplication;
window.refreshWeatherFromUI = () => refreshWeather(false);
window.refreshWeatherByLocationFromUI = () => refreshWeather(true);
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      if (window.caches && caches.keys) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      console.log("舊快取已清除");
    } catch (e) {
      console.log("清除快取失敗", e);
    }
  });
}

onAuthStateChanged(auth, async user => {
  clearSubs();
  if(user){
    setState({currentUser:user,authReady:true});
    await ensureProfile(user);
  }else{
    resetPendingPhoto();
    setState({currentUser:null,profile:null,authReady:true,users:[],applications:[],handovers:[],announcements:[],showAnnouncementModal:false});
  }
});

render();
</script>
</body>
</html>
