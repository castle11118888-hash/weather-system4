function weatherCodeInfo(code){

function weatherWeekdayLabel(dateText,index){
  if(index===0) return "今天";

  const names = ["週日","週一","週二","週三","週四","週五","週六"];

function weatherDisplayDate(dateText){
  const parts = String(dateText||"").split("-");
  return parts.length===3 ? `${parts[1]}/${parts[2]}` : "--/--";
}
async function fetchOpenMeteoWeather(place){
  const params = new URLSearchParams({
    latitude:String(place.latitude),
    longitude:String(place.longitude),
    timezone:"Asia/Taipei",
    current:"temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,precipitation_probability",
    daily:"weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
    forecast_days:"7"
  });
  const res = await fetch(`${weatherApiBase}?${params.toString()}`, { cache:"no-store" });
  if(!res.ok) throw new Error(`weather api ${res.status}`);
  return await res.json();
}
function applyWeatherPayload(data, place, usingCurrentLocation=false){
  const current = data.current || {};
  const daily = data.daily || {};
  const [icon, desc] = weatherCodeInfo(current.weather_code ?? (daily.weather_code||[])[0]);
  const times = daily.time || [];
  const week = times.slice(0,7).map((dateText,index) => {
    const [dayIcon, dayText] = weatherCodeInfo((daily.weather_code||[])[index]);
    return {
      weekday: weatherWeekdayLabel(dateText,index),
      displayDate: weatherDisplayDate(dateText),
      icon: dayIcon,
      text: dayText,
      high: Math.round((daily.temperature_2m_max||[])[index] ?? 0),
      low: Math.round((daily.temperature_2m_min||[])[index] ?? 0),
      rain: Math.round((daily.precipitation_probability_max||[])[index] ?? 0)
    };
  });
  const now = new Date();
  weatherState = {
    ...weatherState,
    loading:false,
    city: place.city || (usingCurrentLocation ? "目前位置" : "台中市"),
    currentTemp: Math.round(current.temperature_2m ?? weatherState.currentTemp),
    currentDesc: desc,
    humidity: `${Math.round(current.relative_humidity_2m ?? 0)}%`,
    rainToday: `${Math.round(current.precipitation_probability ?? ((daily.precipitation_probability_max||[])[0] ?? 0))}%`,
    comfort: `體感 ${Math.round(current.apparent_temperature ?? current.temperature_2m ?? 0)}°C`,
    icon,
    week: week.length ? week : weatherState.week,
    updatedAt: `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,
    usingCurrentLocation,
    error:"",
    note:"即時天氣資料來源：Open-Meteo，自動連線更新。"
  };
}
function getBrowserLocation(){
  return new Promise((resolve,reject) => {
    if(!navigator.geolocation) return reject(new Error("此瀏覽器不支援定位"));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ city:"目前位置", latitude:pos.coords.latitude, longitude:pos.coords.longitude }),
      err => reject(err),
      { enableHighAccuracy:false, timeout:8000, maximumAge:600000 }
    );
  });
}
async function refreshWeather(forceLocation=false){
  const requestId = Date.now();
  weatherLastRequest = requestId;
  weatherState = { ...weatherState, loading:true, error:"", note: forceLocation ? "正在取得目前位置天氣..." : "正在連線更新即時天氣..." };
  if(!state.currentUser || !state.profile) render();
  try{
    const place = forceLocation ? await getBrowserLocation() : weatherDefaultPlace;
    const data = await fetchOpenMeteoWeather(place);
    if(weatherLastRequest !== requestId) return;
    applyWeatherPayload(data, place, forceLocation);
  }catch(err){
    if(weatherLastRequest !== requestId) return;
    weatherState = {
      ...weatherState,
      loading:false,
      city: forceLocation ? "目前位置" : "台中市",
      error:"天氣連線暫時失敗，已保留最後一次資料。",
      note:"請確認網路或瀏覽器定位權限後再刷新。"
    };
  }
  if(!state.currentUser || !state.profile) render();
}

function selectPhotoFiles(fileList){
  const files = Array.from(fileList || []);
  if(!files.length){ resetPendingPhoto(); render(); return; }
  if(files.length > 5) return alert("一則交接最多可上傳 5 個媒體檔案");
  const invalid = files.find(file => !(String(file.type||"").startsWith("image/") || String(file.type||"").startsWith("video/")));
  if(invalid) return alert("請選擇圖片或影片檔案");
  const oversize = files.find(file => file.size > 20 * 1024 * 1024);
  if(oversize) return alert(`單一媒體檔案請控制在 20MB 以內：${oversize.name || "未命名檔案"}`);
  revokePhotoPreview();
  pendingPhotoFiles = files;
  state.newItemPhotoPreviews = files.map(file => URL.createObjectURL(file));
  state.newItemPhotoNames = files.map(file => file.name || "媒體檔案");
  state.newItemMediaTypes = files.map(file => String(file.type || ""));
  render();
}
function removePendingPhoto(index){
  if(index < 0 || index >= pendingPhotoFiles.length) return;
  const previews = Array.isArray(state.newItemPhotoPreviews) ? [...state.newItemPhotoPreviews] : [];
  const targetUrl = previews[index];
  if(targetUrl && String(targetUrl).startsWith("blob:")){
    try{ URL.revokeObjectURL(targetUrl); }catch(e){}
  }
  pendingPhotoFiles.splice(index,1);
  previews.splice(index,1);
  const names = Array.isArray(state.newItemPhotoNames) ? [...state.newItemPhotoNames] : [];
  names.splice(index,1);
  const mediaTypes = Array.isArray(state.newItemMediaTypes) ? [...state.newItemMediaTypes] : [];
  mediaTypes.splice(index,1);
  state.newItemPhotoPreviews = previews;
  state.newItemPhotoNames = names;
  state.newItemMediaTypes = mediaTypes;
  render();
}
function formatResetPasswordError(error){
  const code = String(error?.code || "");
  if(code === "auth/invalid-email") return "Email 格式不正確，請重新確認。";
  if(code === "auth/missing-email") return "請先輸入 Email。";
  if(code === "auth/too-many-requests") return "此功能操作過於頻繁，請稍後再試。";
  if(code === "auth/network-request-failed") return "網路連線異常，請確認網路後再試。";
  if(code === "auth/user-not-found") return "查無此登入帳號，請確認 Email 是否正確。";
  if(code === "auth/unauthorized-continue-uri") return "Firebase 尚未授權目前網域。系統已改用 Firebase 預設重設信流程；若仍看到此訊息，請重新整理後再試。";
  if(code === "auth/invalid-continue-uri") return "重設密碼導向網址設定錯誤。";
  return `寄送失敗：${code || "unknown"}${error?.message ? "｜" + error.message : ""}`;
}

function formatStorageError(error){
  const code = String(error?.code || "");
  const msg = String(error?.message || "");
  if(code.includes("storage/unauthorized")) return "沒有 Storage 寫入權限（storage/unauthorized）";
  if(code.includes("storage/unauthenticated")) return "目前登入狀態無法通過 Storage 驗證（storage/unauthenticated）";
  if(code.includes("storage/object-not-found")) return "檔案路徑不存在（storage/object-not-found）";
  if(code.includes("storage/quota-exceeded")) return "Storage 額度已滿（storage/quota-exceeded）";
  if(code.includes("storage/retry-limit-exceeded")) return "上傳重試次數超過限制（storage/retry-limit-exceeded）";
  if(code.includes("storage/unknown")) return `Storage 未知錯誤（storage/unknown）${msg ? "：" + msg : ""}`;
  return `${code || "unknown"}${msg ? "：" + msg : ""}`;
}

async function uploadHandverPhoto(file){  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
  const safeExt = ext.replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `handover_photos/${effectiveStore()}/${state.selectedDate}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;

  let lastError = null;  for(const target of storageInstances){
    try{
      const photoRef = storageRef(target.instance, path);
      await uploadBytes(photoRef, file);      const url = await getDownloadURL(photoRef);      return url;
    }catch(error){
      console.error("Storage upload failed:", target.bucket, error);
      lastError = error;
    }
  }

  const fallbackRef = storageRef(storage, path);
  try{
    await uploadBytes(fallbackRef, file);    const url = await getDownloadURL(fallbackRef);    return url;
  }catch(error){
    console.error("Default storage upload failed:", error);
    lastError = error || lastError;
  }

  throw lastError || new Error("storage upload failed");
}
async function uploadHandverPhotos(files){
  const list = Array.from(files || []);
  const uploaded = [];
  for(const file of list){
    const url = await uploadHandverPhoto(file);
    uploaded.push({ url, name:file.name || "照片" });
  }
  return uploaded;
}

    .sort((a,b) => `${b.date||""}${b.shift||""}`.localeCompare(`${a.date||""}${a.shift||""}`));

  const announcements = state.announcements.filter(a => {

  });
  const users = canManageUsers() ? state.users.filter(u =>
    !u.removed && storeMatchesFilter(u.storeId||u.store) && (String(u.username||u.email||"").toLowerCase().includes(q) ||
    String(u.name||"").toLowerCase().includes(q) ||
    String(u.role||"").toLowerCase().includes(q) ||
    String(u.storeId||u.store||"").toLowerCase().includes(q))
  ) : [];
  return {stores,items,announcements,users};
}

function groupedSearchItemsByStore(items){
  const order = visibleStores().map(s => s.id);
  const map = new Map();
  (items || []).forEach(item => {
    const key = item.storeId || "其他";
    if(!map.has(key)){

      map.set(key, { id:key, name:item.storeName || store?.name || (key === "其他" ? "其他" : `${key}店`), items:[] });
    }
    map.get(key).items.push(item);
  });
  return Array.from(map.values()).sort((a,b) => {
    const ai = order.indexOf(a.id), bi = order.indexOf(b.id);
    if(ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return String(a.name).localeCompare(String(b.name), "zh-Hant");

const RELOAD_LOGIN_SESSION_KEY = "weather_reload_login_session_B613";
const RELOAD_LOGIN_FLAG_KEY = "weather_reload_in_progress_B613";
const RELOAD_LOGIN_MAX_AGE_MS = 12 * 60 * 60 * 1000;
function safeUserForReload(user){
  if(!user) return null;
  return { uid:String(user.uid || ""), email:String(user.email || "") };
}
function saveReloadLoginSession(user, profile){
  try{
    if(!user || !profile) return;
    localStorage.setItem(RELOAD_LOGIN_SESSION_KEY, JSON.stringify({
      user:safeUserForReload(user),
      profile:{...profile},
      tab:state.tab || "dashboard",
      selectedStore:state.selectedStore || "A",
      selectedDate:dashboardActiveDate(),
      savedAt:Date.now()
    }));
  }catch(e){}
}
function readReloadLoginSession(){
  try{
    const idleDeadline = Number(localStorage.getItem("weather_force_logout_deadline_B696") || 0);
    if(idleDeadline && Date.now() >= idleDeadline){
      try{
        localStorage.removeItem(RELOAD_LOGIN_SESSION_KEY);
        localStorage.removeItem(RELOAD_LOGIN_FLAG_KEY);
      }catch(e){}
      return null;
    }
    const raw = localStorage.getItem(RELOAD_LOGIN_SESSION_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(!data || !data.user || !data.profile || !data.savedAt) return null;
    if(Date.now() - Number(data.savedAt) > RELOAD_LOGIN_MAX_AGE_MS) return null;
    return data;
  }catch(e){ return null; }
}
function clearReloadLoginSession(){
  try{
    localStorage.removeItem(RELOAD_LOGIN_SESSION_KEY);
    localStorage.removeItem(RELOAD_LOGIN_FLAG_KEY);
  }catch(e){}
}
function markReloadLoginInProgress(){
  try{
    if(state.currentUser && state.profile){
      saveReloadLoginSession(state.currentUser, state.profile);
      localStorage.setItem(RELOAD_LOGIN_FLAG_KEY, String(Date.now()));
    }
  }catch(e){}
}
function shouldSoftRestoreAfterReload(){
  try{
    const ts = Number(localStorage.getItem(RELOAD_LOGIN_FLAG_KEY) || 0);
    return ts && Date.now() - ts < 2 * 60 * 1000;
  }catch(e){ return false; }
}

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.pendingApproval){
      await signOut(auth);
      setState({loginError:"此帳號正在等待管理員審核。", profile:null, currentUser:null});
      return;
    }
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    const deviceCheck = await applyDeviceLockForLogin(user, data);
    if(!deviceCheck || !deviceCheck.ok) return;
    const nextProfile = {id:user.uid,...data,...(deviceCheck.profilePatch || {}),role:normalizeRole(data.role)};
    const nextStore = defaultDashboardStore(nextProfile);
    state.__storeManuallyChanged = false;
    state.__storeDefaultSyncedFor = String(user.uid || "");
    const loginToday = today();
    const loginShift = currentBusinessShift();
    setState({
      profile:nextProfile,
      selectedStore:nextStore,
      handoverTopStore:nextStore,
      handoverListStore:nextStore,
      historyStore:nextStore,
      selectedDate:loginToday,
      historyDate:loginToday,
      newItemDate:loginToday,
      newItemShift:loginShift,
      selectedShift:"",
      historyShift:"",
      historyStatusFilter:"",
      formsStatusFilter:""
    });
    saveReloadLoginSession(user, nextProfile);
    // 7.3.5：手機版不再等待完整 getDocs 預載完成才進後台；先立即顯示總覽/交接頁，再由監聽與背景補讀更新資料。
    setState({authReady:true});
    subscribeData();
    scheduleMobileHandoverSync('login');
    resetStoreSupervisorIdleLogout();
    setTimeout(maybePromptBiometricAfterLogin, 500);
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"store_supervisor", storeId:firstUser?null:"A", defaultStoreId:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  const deviceCheck = await applyDeviceLockForLogin(user, profile);
  if(!deviceCheck || !deviceCheck.ok) return;
  const createdProfile = {id:user.uid,...profile,...(deviceCheck.profilePatch || {}),role:normalizeRole(profile.role)};
  setState({ profile:createdProfile, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為店主管 寶慶。" });
  saveReloadLoginSession(user, createdProfile);
  // 7.3.5：新帳號同樣先進入畫面，避免手機等待完整資料預載。
  setState({authReady:true});
  subscribeData();
  scheduleMobileHandoverSync('login');
  resetStoreSupervisorIdleLogout();
  setTimeout(maybePromptBiometricAfterLogin, 500);
}
function handoverMonthRange(dateValue){
  const base = /^\d{4}-\d{2}-\d{2}$/.test(String(dateValue || "")) ? String(dateValue).slice(0,10) : today();
  const [y,m] = base.split("-").map(Number);
    const start = String(y) + "-" + String(m).padStart(2,"0") + "-01";
  const endDate = new Date(y, m, 0).getDate();
    const end = String(y) + "-" + String(m).padStart(2,"0") + "-" + String(endDate).padStart(2,"0");
  return {start,end};
}
function mergeHandoverRows(existing, incoming){
  const map = new Map((existing || []).map(row => [String(row.id), row]));
  (incoming || []).forEach(row => map.set(String(row.id), {...(map.get(String(row.id)) || {}), ...row}));
  return Array.from(map.values());
}
function currentMonthHandoversQuery(){
  const activeDate = state.tab === "dashboard" ? (state.dashboardDate || state.selectedDate || today()) : (state.newItemDate || state.historyDate || today());
  const range = handoverMonthRange(activeDate);
  return query(collection(db,"handovers"), where("date", ">=", range.start), where("date", "<=", range.end));
}

    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));

  unsubscribers.push(onSnapshot(collection(db,"stores"), async snap => {

    setState({stores:rows, storeDrafts:Object.fromEntries(rows.map(s=>[s.id,normalizeStoreName(s.id, s.name)]))});
  }));
}
function subscribeData(){
  clearSubs();
  // 7.3.5：最強優化版。先掛即時監聽，背景補讀只當保險；相同資料不重複渲染，降低手機卡頓。
  subscribeSharedCollections();

  let handoverSnapshotArrived = false;
  let handoverApplyTimer = null;
  const handoverRowsSignature = rows => {
    try{
      return (rows || []).map(r => [
        r.id, r.date, normalizeStoreId(r.storeId), r.shift, r.status, r.category,
        r.updatedAt?.seconds || r.updatedAt || "",
        r.createdAt?.seconds || r.createdAt || "",
        String(r.content || "").length,
        Array.isArray(r.readBy) ? r.readBy.length : 0,
        Array.isArray(r.photos) ? r.photos.length : 0
      ].join("~")).sort().join("|");
    }catch(e){ return String(Date.now()); }
  };
  const applyHandoverRows = (rows, sourceLabel) => {
    const normalizedRows = Array.isArray(rows) ? rows.map(r => ({...r, storeId:normalizeStoreId(r.storeId)})) : [];
    const signature = handoverRowsSignature(normalizedRows);
    if(sourceLabel === "snapshot" && signature && signature === state.__handoverRowsSignature) return;
    state.__handoverRowsSignature = signature;
    clearTimeout(handoverApplyTimer);
    handoverApplyTimer = setTimeout(() => {
      setState({
        handovers: normalizedRows,
        handoverCalendarSyncedAt: new Date().toISOString(),
        mobileBackgroundSyncedAt: new Date().toISOString(),
        mobilePrioritySyncedAt: new Date().toISOString(),
        mobilePriorityLoadedAt: new Date().toISOString(),
        infoMessage: state.infoMessage || (sourceLabel === "fallback" ? "已補齊交接資料。" : "")
      });
      if(sourceLabel === "fallback"){
        setTimeout(()=>{ try{ if(state.infoMessage === "已補齊交接資料。") setState({infoMessage:""}); }catch(e){} }, 1200);
      }
    }, sourceLabel === "snapshot" ? 60 : 0);
  };

  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => {
    handoverSnapshotArrived = true;
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    applyHandoverRows(rows, "snapshot");
  }, err => {
    console.error("7.3.5 handovers 即時監聽失敗", err);
    try{ setState({infoMessage:"交接即時讀取暫時失敗，正在改用補讀。"}); }catch(e){}
  }));

  // 背景補讀只做保險，不阻塞手機版進入總覽與交接頁；兩段式補讀可降低手機網路慢時的空白感。
  const fallbackRead = async (label) => {
    try{
      if(handoverSnapshotArrived && Array.isArray(state.handovers) && state.handovers.length) return;
      const handoverSnap = await getDocs(collection(db,"handovers"));
      const rows = handoverSnap.docs.map(d=>({id:d.id,...d.data()}));
      applyHandoverRows(rows, label);
    }catch(e){
      console.error("7.3.5 handovers 背景補讀失敗", e);
      try{ setState({infoMessage:"交接資料補讀失敗，請稍後重試或重新整理。"}); }catch(err){}
    }
  };
  setTimeout(()=>fallbackRead("fallback"), 900);
  setTimeout(()=>fallbackRead("fallback-late"), 3200);

  // 其他完整資料仍在背景補齊，但不覆蓋 handovers 的即時來源，避免手機等待。
  primeDashboardDataOnce().catch(e => console.error("7.3.5 background prime failed", e));
  return Promise.resolve();
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員或店長可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) {
    setState({ applications:(state.applications || []).filter(app => app.id !== uid && app.uid !== uid) });
    return;
  }
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

async function deleteApplication(uid){
  if(!canManageUsers()) return alert("只有管理員或店長可刪除申請");
  if(!uid) return;
  const target = (state.applications || []).find(app => String(app.id) === String(uid) || String(app.uid) === String(uid));
  const displayName = target?.name || target?.email || "這筆申請";
  if(!confirm(`確定要刪除 ${displayName} 的申請訊息嗎？\n\n無論資料庫是否仍存在，畫面都會移除這筆資料。`)) return;
  setState({ applications:(state.applications || []).filter(app => String(app.id) !== String(uid) && String(app.uid) !== String(uid)) });
  let deletedAny = false;
  try{
    const appRef = doc(db,"applications",uid);
    const appSnap = await getDoc(appRef);
    if(appSnap.exists()){
      await deleteDoc(appRef);
      deletedAny = true;
    }
  }catch(e){ console.warn("delete application doc failed:", e); }
  try{
    const userRef = doc(db,"users",uid);
    const userSnap = await getDoc(userRef);
    if(userSnap.exists()){
      await setDoc(userRef, { pendingApproval:false, applicationStatus:"deleted", active:false, updatedAt:serverTimestamp() }, {merge:true});
      deletedAny = true;
    }
  }catch(e){ console.warn("mark user application deleted failed:", e); }
  setState({ applications:(state.applications || []).filter(app => String(app.id) !== String(uid) && String(app.uid) !== String(uid)) });
  alert(deletedAny ? "已刪除申請訊息" : "找不到資料庫紀錄，已從畫面移除這筆申請訊息");
}

// 7.3.5：設備綁定與 5 分鐘安全機制已同步手機 + 電腦。
// 規則：同一設備 + 同一瀏覽器可保留登入；關閉網頁再開不用重新驗證；無操作 / 切分頁 / 最小化 / 手機背景超過 5 分鐘自動登出。
// 7.3.5：所有已登入帳號套用 5 分鐘無操作 / 手機縮小 / 切到背景後強制登出。
const GLOBAL_IDLE_LOGOUT_LIMIT_MS = 5 * 60 * 1000;
const GLOBAL_IDLE_LOGOUT_DEADLINE_KEY = "weather_force_logout_deadline_B696";
const GLOBAL_IDLE_LOGOUT_HIDDEN_KEY = "weather_hidden_at_B696";
let storeSupervisorIdleTimer = null;
let storeSupervisorIdleTicker = null;
let storeSupervisorLastActivityAt = Date.now();

function isStoreSupervisorIdleLogoutTarget(){ return !!state.currentUser; }
function removeIdleLogoutToast(){ document.getElementById("idleLogoutToast")?.remove(); }
function showIdleLogoutToast(message){
  removeIdleLogoutToast();
  const toast = document.createElement("div");
  toast.id = "idleLogoutToast";
  toast.className = "idle-logout-toast";
  toast.textContent = message;
  document.body.appendChild(toast);
}
function idleNow(){ return Date.now(); }
function writeIdleDeadline(deadline){
  try{ localStorage.setItem(GLOBAL_IDLE_LOGOUT_DEADLINE_KEY, String(deadline)); }catch(e){}
}
function readIdleDeadline(){
  try{ return Number(localStorage.getItem(GLOBAL_IDLE_LOGOUT_DEADLINE_KEY) || 0); }catch(e){ return 0; }
}
function clearIdleDeadline(){
  try{
    localStorage.removeItem(GLOBAL_IDLE_LOGOUT_DEADLINE_KEY);
    localStorage.removeItem(GLOBAL_IDLE_LOGOUT_HIDDEN_KEY);
  }catch(e){}
}
function stopStoreSupervisorIdleLogout(){
  if(storeSupervisorIdleTimer){
    clearTimeout(storeSupervisorIdleTimer);
    storeSupervisorIdleTimer = null;
  }
  if(storeSupervisorIdleTicker){
    clearInterval(storeSupervisorIdleTicker);
    storeSupervisorIdleTicker = null;
  }
  removeIdleLogoutToast();
}
async function forceStoreSupervisorIdleLogout(reason){
  if(!isStoreSupervisorIdleLogoutTarget()){
    stopStoreSupervisorIdleLogout();
    clearIdleDeadline();
    return;
  }
  showIdleLogoutToast(reason || "帳號已超過 5 分鐘未操作，系統已自動登出。");
  try{
    clearReloadLoginSession();
    clearIdleDeadline();
    await logout();
    setState({loginError:reason || "帳號已超過 5 分鐘未操作，請重新登入。"});
  }catch(e){
    console.error("force idle logout failed", e);
  }
}
function scheduleIdleTimerByDeadline(deadline){
  if(storeSupervisorIdleTimer) clearTimeout(storeSupervisorIdleTimer);
  const remaining = Math.max(0, Number(deadline || 0) - idleNow());
  storeSupervisorIdleTimer = setTimeout(() => {
    forceStoreSupervisorIdleLogout("帳號已超過 5 分鐘未操作，系統已自動登出。");
  }, remaining);
}
function resetStoreSupervisorIdleLogout(){
  if(!isStoreSupervisorIdleLogoutTarget()){
    stopStoreSupervisorIdleLogout();
    clearIdleDeadline();
    return;
  }
  storeSupervisorLastActivityAt = idleNow();
  const deadline = storeSupervisorLastActivityAt + GLOBAL_IDLE_LOGOUT_LIMIT_MS;
  writeIdleDeadline(deadline);
  scheduleIdleTimerByDeadline(deadline);
  if(!storeSupervisorIdleTicker){
    storeSupervisorIdleTicker = setInterval(() => {
      if(!isStoreSupervisorIdleLogoutTarget()){
        stopStoreSupervisorIdleLogout();
        clearIdleDeadline();
        return;
      }
      const deadlineNow = readIdleDeadline();
      if(deadlineNow && idleNow() >= deadlineNow){
        forceStoreSupervisorIdleLogout("帳號已超過 5 分鐘未操作，系統已自動登出。");
      }
    }, 15000);
  }
}
function checkStoreSupervisorIdleDeadline(){
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  const deadline = readIdleDeadline();
  if(deadline && idleNow() >= deadline){
    forceStoreSupervisorIdleLogout("帳號已超過 5 分鐘未操作，系統已自動登出。");
  }else if(deadline){
    scheduleIdleTimerByDeadline(deadline);
  }else{
    resetStoreSupervisorIdleLogout();
  }
}
function handleStoreSupervisorActivity(){
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  if(document.hidden) return;
  const now = idleNow();
  if(now - storeSupervisorLastActivityAt < 1000) return;
  resetStoreSupervisorIdleLogout();
}
["click","keydown","mousemove","mousedown","touchstart","touchmove","scroll","wheel","input","change","pointerdown","pointermove"].forEach(evt => {
  document.addEventListener(evt, handleStoreSupervisorActivity, {passive:true, capture:true});
});
function startBackgroundIdleLogoutDeadline(){
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  const now = idleNow();
  try{ localStorage.setItem(GLOBAL_IDLE_LOGOUT_HIDDEN_KEY, String(now)); }catch(e){}
  // 7.3.5：手機切 App、電腦網頁縮小 / 切分頁時，從「離開畫面當下」重新計算 5 分鐘。
  const deadline = now + GLOBAL_IDLE_LOGOUT_LIMIT_MS;
  writeIdleDeadline(deadline);
  scheduleIdleTimerByDeadline(deadline);
}
function resumeFromBackgroundIdleLogout(){
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  const hiddenAt = (() => { try{ return Number(localStorage.getItem(GLOBAL_IDLE_LOGOUT_HIDDEN_KEY) || 0); }catch(e){ return 0; } })();
  if(hiddenAt && idleNow() - hiddenAt >= GLOBAL_IDLE_LOGOUT_LIMIT_MS){
    forceStoreSupervisorIdleLogout("帳號已離開頁面 / 縮小 / 切到背景超過 5 分鐘，系統已自動登出。");
    return;
  }
  checkStoreSupervisorIdleDeadline();
}
document.addEventListener("visibilitychange", () => {
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  if(document.hidden){
    startBackgroundIdleLogoutDeadline();
  }else{
    resumeFromBackgroundIdleLogout();
  }
}, {capture:true});
window.addEventListener("blur", () => {
  if(!isStoreSupervisorIdleLogoutTarget()) return;
  startBackgroundIdleLogoutDeadline();
}, {capture:true});
window.addEventListener("focus", resumeFromBackgroundIdleLogout, {capture:true});
window.addEventListener("pageshow", resumeFromBackgroundIdleLogout, {capture:true});
window.addEventListener("pagehide", startBackgroundIdleLogoutDeadline, {capture:true});
window.addEventListener("storage", event => {
  if(event.key === GLOBAL_IDLE_LOGOUT_DEADLINE_KEY) checkStoreSupervisorIdleDeadline();
}, {capture:true});

function immediateLogoutOnPageClose(){
  try{ checkStoreSupervisorIdleDeadline(); }catch(e){}
}

async function createAdminManagedUser(){

  const storeId = String(state.adminNewStore || "A").trim() || "A";
  const active = String(state.adminNewStatus || "true") !== "false";
  if(!email) return setState({adminCreateError:"請輸入 Email", adminCreateMessage:""});
  if(!/^\S+@\S+\.\S+$/.test(email)) return setState({adminCreateError:"Email 格式不正確", adminCreateMessage:""});
  if(!name) return setState({adminCreateError:"請輸入姓名", adminCreateMessage:""});
  if(!["admin","general_manager","store_supervisor"].includes(role)) return setState({adminCreateError:"角色只能選管理員、店長或店主管", adminCreateMessage:""});
  if(!canAssignRole(role)) return setState({adminCreateError:"店長不能建立管理員帳號", adminCreateMessage:""});
  const duplicate = state.users.find(u => !u.removed && String(u.email || u.username || "").toLowerCase() === email.toLowerCase());
  if(duplicate) return setState({adminCreateError:"此 Email 已存在於帳號列表", adminCreateMessage:""});
  if(!confirm(`確定要建立帳號？\n\n姓名：${name}\nEmail：${email}\n角色：${roleLabel(role)}\n\n建立後可立即按「寄重設信」讓對方自行設定密碼。`)) return;
  let secondaryApp = null;
  try{
    setState({adminCreateError:"", adminCreateMessage:"建立中，請稍候..."});
    secondaryApp = initializeApp(firebaseConfig, `adminCreateUser_${Date.now()}_${Math.random().toString(36).slice(2)}`);
    const secondaryAuth = getAuth(secondaryApp);
    secondaryAuth.languageCode = "zh-TW";
    const tempPassword = `Tmp${Math.random().toString(36).slice(2)}${Date.now()}!A1`;
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, tempPassword);
    const payload = {
      email,
      username: email,
      name,
      role,
      storeId: ["admin","general_manager"].includes(role) ? null : storeId,
      defaultStoreId: storeId,
      active,
      pendingApproval:false,
      applicationStatus:"approved",
      createdByUid: currentUid() || null,
      createdByName: currentUserName(),
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };
    await setDoc(doc(db,"users",cred.user.uid), payload, {merge:true});
    try{ await sendPasswordResetEmail(secondaryAuth, email); }catch(mailErr){ console.warn("create user reset email failed", mailErr); }
    try{ await signOut(secondaryAuth); }catch(_e){}
    await deleteApp(secondaryApp);
    secondaryApp = null;
    setState({
      adminNewEmail:"",adminNewName:"",adminNewRole:"store_supervisor",adminNewStore:"A",adminNewStatus:"true",
      adminCreateError:"",
      adminCreateMessage:`已建立 ${name}，並嘗試寄出密碼重設信。若未收到，也可以在列表按「寄重設信」重寄。`
    });
  }catch(e){
    console.error("create managed user failed:", e);
    let msg = "建立帳號失敗，請稍後再試。";
    const code = String(e?.code || "");
    if(code.includes("auth/email-already-in-use")) msg = "此 Email 已被 Firebase Authentication 使用。";
    else if(code.includes("auth/invalid-email")) msg = "Email 格式不正確。";
    else if(code.includes("permission-denied")) msg = "Firestore 權限不足，請檢查 Firebase 規則。";
    else if(e?.message) msg = e.message;
    setState({adminCreateError:msg, adminCreateMessage:""});
    if(secondaryApp){ try{ await deleteApp(secondaryApp); }catch(_e){} }
  }
}

function biometricStorageKey(email){

}
function biometricCredentialKey(email){

}
function biometricRememberedEmail(){

function biometricIsBound(){

function biometricStoredCredential(email){

}
function isMobileQuickLoginDevice(){
  const ua = navigator.userAgent || "";
  const uaDataMobile = !!(navigator.userAgentData && navigator.userAgentData.mobile);
  const mobileUA = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(ua);
  const touchSmallScreen = (navigator.maxTouchPoints || 0) > 0 && Math.min(window.innerWidth || 9999, screen.width || 9999) <= 980;
  return uaDataMobile || mobileUA || touchSmallScreen;
}
function biometricDeviceTypeLabel(){
  const ua = navigator.userAgent || "";
  if(/iPhone|iPad|iPod/i.test(ua)) return "iPhone / iPad Face ID 或 Touch ID";
  if(/Android/i.test(ua)) return "Android 臉部或指紋";
  if(/Macintosh/i.test(ua)) return "Mac Touch ID / Passkey";
  if(/Windows/i.test(ua)) return "Windows Hello";
  return "裝置內建驗證";
}
function canUsePlatformBiometric(){
  return !!(window.PublicKeyCredential && navigator.credentials && PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable);
}
function scheduleBiometricSupportCheck(){
  if(!isMobileQuickLoginDevice()){
    state.biometricChecked = true;

    state.biometricDeviceLabel = "行動裝置限定";
    return;
  }
  if(state.biometricChecked) return;
  state.biometricChecked = true;
  state.biometricDeviceLabel = biometricDeviceTypeLabel();
  if(!canUsePlatformBiometric()){
    state.biometricSupported = false;
    setTimeout(()=>setState({biometricSupported:false, biometricDeviceLabel:biometricDeviceTypeLabel()}),0);
    return;
  }
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
    setState({biometricSupported:!!ok, biometricDeviceLabel:biometricDeviceTypeLabel()});
  }).catch(()=>setState({biometricSupported:false, biometricDeviceLabel:biometricDeviceTypeLabel()}));
}

function bytesToBase64Url(bytes){
  const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
  let s = "";
  arr.forEach(b => s += String.fromCharCode(b));
  return btoa(s).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function base64UrlToBytes(str){
  str = String(str || "").replace(/-/g,"+").replace(/_/g,"/");
  while(str.length % 4) str += "=";
  const bin = atob(str);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function randomChallenge(len=32){
  const b = new Uint8Array(len);
  if(window.crypto && crypto.getRandomValues) crypto.getRandomValues(b);
  else for(let i=0;i<len;i++) b[i] = Math.floor(Math.random()*256);
  return b;
}
async function createBiometricCredential(email){
  if(!canUsePlatformBiometric()){
    throw new Error("此裝置或瀏覽器不支援 Face ID / 指紋快速登入，請使用一般登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置未啟用可用的臉部 / 指紋 / 螢幕鎖驗證。");
  const cleanEmail = String(email || "").trim().toLowerCase();
  if(!cleanEmail) throw new Error("找不到帳號 Email，請先完成一般登入。");
  const userBytes = new TextEncoder().encode(cleanEmail).slice(0,64);
  const credential = await navigator.credentials.create({
    publicKey:{
      challenge: randomChallenge(32),
      rp:{name:"天氣系統"},
      user:{id:userBytes, name:cleanEmail, displayName:cleanEmail},
      pubKeyCredParams:[
        {type:"public-key", alg:-7},
        {type:"public-key", alg:-257}
      ],
      authenticatorSelection:{
        authenticatorAttachment:"platform",
        userVerification:"required",
        residentKey:"preferred",
        requireResidentKey:false
      },
      timeout:60000,
      attestation:"none"
    }
  });
  if(!credential || !credential.rawId) throw new Error("未完成裝置驗證，快速登入未啟用。");
  const record = {
    id: credential.id,
    rawId: bytesToBase64Url(credential.rawId),
    type: credential.type,
    createdAt: Date.now(),
    device: biometricDeviceTypeLabel()
  };
  localStorage.setItem(biometricCredentialKey(cleanEmail), JSON.stringify(record));
  return record;
}
async function runDeviceVerification(email){
  // 7.3.5：每次快速登入都必須進入這裡，並呼叫 navigator.credentials.get()。
  const cleanEmail = String(email || biometricRememberedEmail() || state.loginEmail || "").trim().toLowerCase();
  const record = biometricStoredCredential(cleanEmail);
  if(!record || !record.rawId) throw new Error("此裝置尚未建立 Face ID / 指紋憑證，請先用 Email + 密碼登入一次並重新啟用快速登入。");
  if(!canUsePlatformBiometric()){
    throw new Error("此瀏覽器不支援裝置驗證，請使用 Email + 密碼登入。");
  }
  const ok = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().catch(()=>false);
  if(!ok) throw new Error("目前裝置無法執行 Face ID / 指紋驗證。");
  const assertion = await navigator.credentials.get({
    publicKey:{
      challenge: randomChallenge(32),
      allowCredentials:[{type:"public-key", id:base64UrlToBytes(record.rawId)}],
      userVerification:"required",
      timeout:60000
    }
  });
  if(!assertion || !assertion.rawId) throw new Error("未完成 Face ID / 指紋驗證。");
  return true;
}
function biometricSessionStorageKey(email){
  return "weather_biometric_session_" + String(email || "").trim().toLowerCase();
}
function saveBiometricLocalSession(email){

function loadBiometricLocalSession(email){

async function enterAfterBiometricVerification(email){
  const cleanEmail = String(email || biometricRememberedEmail() || "").trim().toLowerCase();
  if(!cleanEmail) throw new Error("找不到已綁定帳號，請先用 Email + 密碼登入一次。");
  if(auth && auth.currentUser && String(auth.currentUser.email || "").trim().toLowerCase() === cleanEmail){
    await ensureProfile(auth.currentUser);
    setState({loginError:"", infoMessage:"Face ID / 指紋驗證成功，已快速登入。", publicGateStage:0, showBiometricUpgrade:false});
    return;
  }
  const saved = loadBiometricLocalSession(cleanEmail);
  if(saved && saved.profile){
    const user = {uid: saved.uid || cleanEmail, email: cleanEmail};
    const profile = {...saved.profile, email: saved.profile.email || cleanEmail};
    setState({currentUser:user, profile, loginEmail:cleanEmail, loginPassword:"", loginError:"", infoMessage:"Face ID / 指紋驗證成功，已快速登入。", publicGateStage:0, showBiometricUpgrade:false});
    return;
  }
  throw new Error("Face ID / 指紋驗證成功，但找不到可登入的本機帳號資料。請先用 Email + 密碼登入一次，完成後即可快速登入。");
}

function isVideoAttachment(url="", mediaType="", mediaName=""){
  const type = String(mediaType || "").toLowerCase();
  const target = `${url || ""} ${mediaName || ""}`.toLowerCase();
  return type.startsWith("video/") || /\.(mp4|webm|mov|m4v|ogg)(\?|#|$|\s)/i.test(target);
}
function mediaListFromItem(item){
  const urls = Array.isArray(item?.photoUrls) && item.photoUrls.length ? item.photoUrls : (item?.photoUrl ? [item.photoUrl] : []);
  const names = Array.isArray(item?.photoNames) && item.photoNames.length ? item.photoNames : (item?.photoName ? [item.photoName] : []);
  const types = Array.isArray(item?.mediaTypes) && item.mediaTypes.length ? item.mediaTypes : (item?.mediaType ? [item.mediaType] : []);
  return urls.map((url,index) => ({
    url,
    name: names[index] || `交接媒體${index+1}`,
    type: types[index] || ""
  }));
}
function renderMediaAttachments(item, size=120){
  const list = mediaListFromItem(item);

  return `<div style="margin-top:10px"><div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-start">${list.map((media,index) => {
    const url = escapeHtml(media.url);

    if(isVideoAttachment(media.url, media.type, media.name)){
      return `<div style="display:grid;gap:6px"><video src="${url}" controls playsinline preload="metadata" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border);background:#000"></video><a href="${url}" target="_blank" rel="noopener noreferrer" class="small" style="max-width:${size}px;word-break:break-all">開啟影片</a></div>`;

    return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="handover-media-link" style="display:grid;gap:6px;text-decoration:none;color:inherit"><img src="${url}" alt="${name}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border)" onerror="this.style.display='none';this.parentElement.innerHTML='${isVideoAttachment(media.url, media.type, media.name) ? '開啟影片' : '開啟附件'}'"></a>`;

}

function monthLabelFromDate(value){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return "";
  return `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}
function addMonths(value, diff){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return today();
  d.setMonth(d.getMonth()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.min(d.getDate(), 28)).padStart(2,"0")}`;
}
function isCompletedHandoverStatus(status){
  const value = String(status || "").trim();
  return value === "done" || value === "已處理" || value === "完成" || value === "已完成";
}
function markerShouldIncludeStore(h, storeId){
  // 7.3.5：紅色日期嚴格依「目前選取店別」判斷；管理員/店長也不再跨店混算。
  const sid = storeId || state.selectedStore || effectiveStore() || defaultDashboardStore();
  if(!sid) return true;
  return normalizeStoreId(h.storeId) === normalizeStoreId(sid);
}
function handoversOnDate(dateValue, storeId){
  const dateKey = String(dateValue || "").slice(0,10);
  const sid = storeId || state.selectedStore || effectiveStore() || defaultDashboardStore();
  return state.handovers.filter(h => String(h.date || "").slice(0,10)===dateKey && markerShouldIncludeStore(h, sid));
}
function hasUnfinishedOnDate(dateValue, storeId){
  return handoversOnDate(dateValue, storeId).some(h => !isCompletedHandoverStatus(h.status));
}
function handoverDateStatusClass(dateValue, storeId){
  // 7.3.5：日期三色規則：白色＝無事件；淺黃色＝有事件且全部已處理；紅色＝有事件尚未處理完成。
  const items = handoversOnDate(dateValue, storeId);
  if(!items.length) return "";
  return items.some(h => !isCompletedHandoverStatus(h.status)) ? "unfinished" : "complete";
}
function calendarDateValue(year, month, day){
  return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function datePickerHtml(target, value, align="right"){
  if(state.openCalendar !== target) return "";
  const base = value ? new Date(value) : new Date();
  const d = Number.isNaN(base.getTime()) ? new Date() : base;
  const year = d.getFullYear();
  const month = d.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const days = [];
  for(let i=0;i<42;i++){
    const cur = new Date(start);
    cur.setDate(start.getDate()+i);
    const val = calendarDateValue(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const isOther = cur.getMonth() !== month;
    const isSelected = val === value;
    const dateStatusClass = handoverDateStatusClass(val, target === "historyDate" ? state.historyStore : effectiveStore());
    days.push(`<button type="button" class="cal-day ${isOther?"other":""} ${dateStatusClass} ${isSelected?"selected":""}" onpointerdown="event.preventDefault(); selectDateFromCalendar('${target}','${val}')">${cur.getDate()}</button>`);
  }
  return `<div class="date-calendar ${align==='left'?'left':''}"><div class="cal-head"><button type="button" class="cal-nav" onpointerdown="event.preventDefault(); moveCalendarMonth('${target}',-1)">‹</button><div>${monthLabelFromDate(value)}</div><button type="button" class="cal-nav" onpointerdown="event.preventDefault(); moveCalendarMonth('${target}',1)">›</button></div><div class="cal-week"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="cal-days">${days.join("")}</div><div class="cal-legend"><span><span class="cal-dot-yellow"></span>全部已處理　<span class="cal-dot-red"></span>有未完成事項</span><button type="button" class="btn secondary" style="padding:6px 10px;border-radius:10px" onpointerdown="event.preventDefault(); selectDateFromCalendar('${target}','${today()}')">今天</button></div></div>`;
}

function monthWheelOptions(center, min, max, padLength=0, range=4){
  const items = [];
  const c = Math.max(min, Math.min(max, Number(center) || min));
  for(let value=c-range; value<=c+range; value++){
    if(value < min || value > max) continue;
    items.push(`<button type="button" class="month-wheel-option ${value===c?'active':''}" data-wheel-value="${value}" onclick="setMonthWheelValue('${arguments[4]||''}', '${arguments[5]||''}', ${value})">${String(value).padStart(padLength,'0')}</button>`);
  }
  return items.join("");
}
function monthYearSelectHtml(target, value, label="年月"){
  const ym = ymFromDate(value || today());
  const [yearText, monthText] = ym.split("-");
  const selectedYear = Number(yearText) || Number(today().slice(0,4)) || new Date().getFullYear();
  const selectedMonth = Number(monthText) || 1;
  const yearOptions = [];
  for(let y=selectedYear-5; y<=selectedYear+5; y++){
    if(y < 1900 || y > 2999) continue;
    const roc = y - 1911;
    const display = roc > 0 ? `民國 ${roc} 年` : `${y} 年`;
    yearOptions.push(`<option value="${y}" ${y===selectedYear?'selected':''}>${display}</option>`);
  }
  const monthOptions = [];
  for(let m=1; m<=12; m++){
    monthOptions.push(`<option value="${String(m).padStart(2,'0')}" ${m===selectedMonth?'selected':''}>${m}月</option>`);
  }
  return `<div class="month-slider-select month-dropdown-select b676-vertical-dropdown" data-month-selector="${target}"><div class="b676-dropdown-field"><label for="${target}Year">年份</label><select id="${target}Year" onchange="setMonthWheelValue('${target}','year',this.value)">${yearOptions.join("")}</select></div><div class="b676-dropdown-field"><label for="${target}Month">月份</label><select id="${target}Month" onchange="setMonthWheelValue('${target}','month',this.value)">${monthOptions.join("")}</select></div></div>`;
}


function dateFromYearMonthKeepingDay(target, year, month){
  const current = target === "historyDate" ? (state.historyDate || today()) : (target === "dateInput" ? (state.dashboardDate || state.selectedDate || today()) : (state.newItemDate || today()));
  const keepDay = Number(String(current).slice(8,10)) || 1;
  const maxDay = new Date(Number(year), Number(month), 0).getDate();
  return `${year}-${String(month).padStart(2,"0")}-${String(Math.min(keepDay, maxDay)).padStart(2,"0")}`;
}


function ymFromDate(value){
  const v = String(value || today());
  return /^\d{4}-\d{2}/.test(v) ? v.slice(0,7) : today().slice(0,7);
}
function daysInMonthFromYM(ym){
  const [y,m] = String(ym || ymFromDate(today())).split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function buildDateFromYMDay(ym, day){
  return `${ym}-${String(day).padStart(2,"0")}`;
}
function normalizeMonthText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "";
  if(/^\d{4}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1];
  }else if(digits.length >= 6){
    y = digits.slice(0,4); m = digits.slice(4,6);
  }
  if(!y || !m) return "";
  const year = Number(y), month = Number(m);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}`;
}
function normalizeDateText(value){
  const raw = String(value || "").trim();
  const digits = raw.replace(/\D/g, "");
  let y = "", m = "", d = "";
  if(/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(raw)){
    const parts = raw.split(/[-\/]/); y = parts[0]; m = parts[1]; d = parts[2];
  }else if(digits.length >= 8){
    y = digits.slice(0,4); m = digits.slice(4,6); d = digits.slice(6,8);
  }
  if(!y || !m || !d) return "";
  const year = Number(y), month = Number(m), day = Number(d);
  if(year < 1900 || year > 2999 || month < 1 || month > 12) return "";
  const max = new Date(year, month, 0).getDate();
  if(day < 1 || day > max) return "";
  return `${String(year).padStart(4,"0")}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function formatDateTyping(value){
  const digits = String(value || "").replace(/\D/g, "").slice(0,8);
  if(digits.length <= 4) return digits;
  if(digits.length <= 6) return `${digits.slice(0,4)}/${digits.slice(4)}`;
  return `${digits.slice(0,4)}/${digits.slice(4,6)}/${digits.slice(6)}`;
}
function formatMonthTyping(value){
  // 支援 KEY 202604，也支援原版顯示 2026年04月；輸入中只格式化，不重繪月曆。
  const digits = String(value || "").replace(/\D/g, "").slice(0,6);
  if(digits.length <= 4) return digits;
  return `${digits.slice(0,4)}年${digits.slice(4)}月`;
}

function monthDateSelectorHtml(value){
  const selected = String(value || today());
  const ym = ymFromDate(selected);
  const [year, monthNum] = ym.split("-").map(Number);
  const monthIndex = (monthNum || 1) - 1;
  const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
  const week = ["一","二","三","四","五","六","日"];
  const weekHtml = week.map(w=>`<div class="month-calendar-week">${w}</div>`).join("");

  const firstDay = new Date(year, monthIndex, 1).getDay(); // 0=日, 1=一 ... 6=六
  const leadingBlankCount = (firstDay + 6) % 7;
  const totalSlots = 35;
  const dayHtml = Array.from({length:totalSlots}, (_, idx) => {
    const day = idx - leadingBlankCount + 1;
    if(day < 1 || day > daysInMonth) return `<div class="month-day-btn month-day-blank" aria-hidden="true"></div>`;
    const date = calendarDateValue(year, monthIndex, day);

    return `<button type="button" class="month-day-btn ${dateStatusClass} ${active ? "active" : ""}" onclick="selectMonthDayFromUI('${date}')"><span>${day}</span><span class="dow">${dow}</span></button>`;

function changeNewItemMonth(diff){
  const current = state.tab === "dashboard" ? (state.selectedDate || today()) : (state.newItemDate || today());
  const base = new Date(current + "T00:00:00");
  const safe = Number.isNaN(base.getTime()) ? new Date() : base;
  const originalDay = Number(String(current).slice(8,10)) || 1;
  safe.setMonth(safe.getMonth() + diff, 1);
  const maxDay = new Date(safe.getFullYear(), safe.getMonth()+1, 0).getDate();
  const next = calendarDateValue(safe.getFullYear(), safe.getMonth(), Math.min(maxDay, originalDay));
  if(state.tab === "dashboard") setState({ selectedDate: next, dashboardDate: next });
  else setState({ newItemDate: next, historyDate: next });
}

function applicationList(){
  const appMap = new Map();
  (state.applications || []).forEach(app => {
    if(app?.id) appMap.set(String(app.id), {id:String(app.id), ...app});
  });
  (state.users || []).forEach(user => {
    const isPending = user?.pendingApproval || user?.applicationStatus === "pending";
    if(!user?.id || user?.removed || !isPending) return;
    if(appMap.has(String(user.id))) return;
    appMap.set(String(user.id), {
      id: String(user.id),
      uid: String(user.id),
      email: user.email || user.username || "",
      name: user.name || "",
      status: user.applicationStatus || "pending",
      createdAt: user.createdAt || user.updatedAt || null,
      updatedAt: user.updatedAt || user.createdAt || null,
      reviewedByName: user.reviewedByName || "",
      fallbackFromUsers: true
    });
  });
  return Array.from(appMap.values()).sort((a,b) => {
    const aSec = Number(a?.updatedAt?.seconds || a?.createdAt?.seconds || 0);
    const bSec = Number(b?.updatedAt?.seconds || b?.createdAt?.seconds || 0);
    return bSec - aSec;
  });
}

function renderApp(root){
  const main = state.tab==="dashboard" ? renderDashboard()
    : state.tab==="forms" ? renderForms()
    : state.tab==="announcements" ? renderAnnouncements()
    : state.tab==="changelog" ? renderChangelog()
    : renderUsers();

  root.innerHTML = `
  <div class="app"><div class="card topbar"><div><div class="title">後台</div><div class="sub">${escapeHtml(currentUserName())}｜${escapeHtml(headerRoleText())}｜${escapeHtml(headerStoreText())}｜${escapeHtml(state.selectedDate)}｜${escapeHtml(shiftLabel(state.selectedShift))}</div></div><div class="top-actions"><button type="button" class="btn secondary" id="globalSearchBtn">搜尋</button><input class="w240" id="searchInput" placeholder="全站搜尋" value="${escapeHtml(state.searchText)}"><button type="button" class="btn secondary" onclick="refreshCurrentViewFromUI(event)">重新整理</button><button class="btn primary" onclick="logoutFromUI()">登出</button></div></div><div class="layout"><div class="card sidebar"><div class="sidebar-version-badge">7.3.5</div><button class="navbtn ${state.tab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">總覽</button><button class="navbtn ${state.tab==="forms"?"active":""}" onclick="switchTab('forms')">交接</button><button class="navbtn ${state.tab==="announcements"?"active":""}" style="position:relative" onclick="switchTab('announcements')">公告${announcementBadgeCount()>0 ? `<span class="unread-badge">${announcementBadgeCount()}</span>` : ""}</button>
        ${canManageUsers() ? `<button class="navbtn ${state.tab==="users"?"active":""}" onclick="switchTab('users')">帳號</button>` : ""}
        ${canManageUsers() ? `<button class="navbtn ${state.tab==="changelog"?"active":""}" onclick="switchTab('changelog')">改版資訊</button>` : ""}
      </div><div class="content">${main}</div></div>
    ${renderAnnouncementModal()}
    ${renderEditModal()}
    ${biometricUpgradeModalHtml()}
  </div>`;

  const search = document.getElementById("searchInput");
  const globalSearchBtn = document.getElementById("globalSearchBtn");
  const applyGlobalSearchFromUI = () => {
    if(!search) return;
    searchUI.restore = true;
    searchUI.start = search.selectionStart;
    searchUI.end = search.selectionEnd;
    setState({searchText:search.value});
  };
  if(globalSearchBtn) globalSearchBtn.onclick = applyGlobalSearchFromUI;
  if(search){
    search.addEventListener("compositionstart", () => {
      searchUI.isComposing = true;
    });
    search.addEventListener("compositionend", () => {
      searchUI.isComposing = false;
    });
    search.addEventListener("input", () => {
      // 7.3.5：全站搜尋改為手動搜尋；KEY 入文字不即時刷新，按「搜尋」或 Enter 才查詢。
    });
    search.addEventListener("keydown", e => {
      if(e.key === "Enter"){
        e.preventDefault();
        applyGlobalSearchFromUI();
      }
      if(e.key === "Escape"){
        e.preventDefault();
        search.value = "";
        applyGlobalSearchFromUI();
      }
    });
  }
  // 7.3.5：日期/年月欄位改為「輸入完成才轉換」；KEY 數字期間不改值、不重繪，避免輸入一半跳掉。
  const newMonth = document.getElementById("newItemMonth"); if(newMonth) {
    newMonth.onwheel = e => { e.preventDefault(); return false; };
    newMonth.oninput = null;
    newMonth.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); applyMonthTextInput(e.target); e.target.blur(); } if(e.key === "Escape"){ e.target.value = formatMonthForDisplay(state.newItemDate || today()); e.target.blur(); } };
    newMonth.onblur = e => applyMonthTextInput(e.target);
  }
  const bindSafeDateInput = el => {
    if(!el) return;
    if(el.dataset.monthDisplay === "1"){
      el.oninput = null;
      el.onkeydown = e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openDateCalendarFromUI(e.target.dataset.dateTarget || e.target.id); } };
      el.onblur = null;
      return;
    }
    el.oninput = null;
    el.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); applyDateTextInput(e.target); e.target.blur(); } if(e.key === "Escape"){ const current = e.target.dataset.dateTarget === "historyDate" ? state.historyDate : state.selectedDate; e.target.value = formatDateForInput(current || today()); e.target.blur(); } };
    el.onblur = e => applyDateTextInput(e.target);
  };
  const date = document.getElementById("dateInput"); bindSafeDateInput(date);
  const shift = document.getElementById("shiftInput"); if(shift) shift.onchange = e => setState({selectedShift:e.target.value});
  const store = document.getElementById("storeInput"); if(store) store.onchange = e => syncHandoverListStoreFromUI(e.target.value);

function handoverRecordTimeValue(item){
  const candidates = [item.updatedAt, item.createdAt];
  for(const value of candidates){
    if(!value) continue;
    if(typeof value.toMillis === "function") return value.toMillis();
    if(typeof value.seconds === "number") return value.seconds * 1000;
    const parsed = Date.parse(value);
    if(!Number.isNaN(parsed)) return parsed;
  }
  const fallback = Date.parse(`${item.date || today()}T23:59:59`);
  return Number.isNaN(fallback) ? 0 : fallback;
}

async function forceMobileHandoverSync(reason='manual'){

  mobileHandoverSyncInFlight = true;
  lastMobileHandoverSyncAt = now;
  document.body?.classList?.add('mobile-syncing');
  try{
    const [handoverSnap, userSnap, storeSnap] = await Promise.all([

      users: userSnap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)})),
      handoverMobileSyncedAt:new Date().toISOString(),
      handoverMobileSyncReason:reason
    };
    const stores = storeSnap.docs.map(d=>({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    if(stores.length){

    }
    setState(patch);
    setTimeout(()=>{

      if(el){ el.classList.add('mobile-sync-flash'); setTimeout(()=>el.classList.remove('mobile-sync-flash'), 800); }
    }, 0);
  }catch(e){

  }finally{
    mobileHandoverSyncInFlight = false;
    setTimeout(()=>document.body?.classList?.remove('mobile-syncing'), 250);
  }
}

      keys.forEach(key=>{
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const val = JSON.parse(raw);

            const xEmail = String(x.email || x.account || "").toLowerCase();

          })));
