function selectPhotoFiles(fileList){
  const files = Array.from(fileList || []);
  if(!files.length){ resetPendingPhoto(); render(); return; }
  if(files.length > 5) return alert("一則交接最多可上傳 5 個媒體檔案");
  const invalid = files.find(file => !(String(file.type||"").startsWith("image/") || String(file.type||"").startsWith("video/")));
  if(invalid) return alert("請選擇圖片或影片檔案");
  const oversize = files.find(file => file.size > 20 * 1024 * 1024);
  if(oversize) return alert(`單一媒體檔案請控制在 20MB 以內：${oversize.name || "未命名檔案"}`);
  revokePhotoPreview();
  pendingPhotoFiles = files;
  state.newItemPhotoPreviews = files.map(file => URL.createObjectURL(file));
  state.newItemPhotoNames = files.map(file => file.name || "媒體檔案");
  state.newItemMediaTypes = files.map(file => String(file.type || ""));
  render();
}
function removePendingPhoto(index){
  if(index < 0 || index >= pendingPhotoFiles.length) return;
  const previews = Array.isArray(state.newItemPhotoPreviews) ? [...state.newItemPhotoPreviews] : [];
  const targetUrl = previews[index];
  if(targetUrl && String(targetUrl).startsWith("blob:")){
    try{ URL.revokeObjectURL(targetUrl); }catch(e){}
  }
  pendingPhotoFiles.splice(index,1);
  previews.splice(index,1);
  const names = Array.isArray(state.newItemPhotoNames) ? [...state.newItemPhotoNames] : [];
  names.splice(index,1);
  const mediaTypes = Array.isArray(state.newItemMediaTypes) ? [...state.newItemMediaTypes] : [];
  mediaTypes.splice(index,1);
  state.newItemPhotoPreviews = previews;
  state.newItemPhotoNames = names;
  state.newItemMediaTypes = mediaTypes;
  render();
}
function formatResetPasswordError(error){
  const code = String(error?.code || "");
  if(code === "auth/invalid-email") return "Email 格式不正確，請重新確認。";
  if(code === "auth/missing-email") return "請先輸入 Email。";
  if(code === "auth/too-many-requests") return "此功能操作過於頻繁，請稍後再試。";
  if(code === "auth/network-request-failed") return "網路連線異常，請確認網路後再試。";
  if(code === "auth/user-not-found") return "查無此登入帳號，請確認 Email 是否正確。";
  if(code === "auth/unauthorized-continue-uri") return "重設密碼網址未被 Firebase 授權，請到 Authentication > Settings > Authorized domains 加入目前網域。";
  if(code === "auth/invalid-continue-uri") return "重設密碼導向網址設定錯誤。";
  return `寄送失敗：${code || "unknown"}${error?.message ? "｜" + error.message : ""}`;
}

function formatStorageError(error){
  const code = String(error?.code || "");
  const msg = String(error?.message || "");
  if(code.includes("storage/unauthorized")) return "沒有 Storage 寫入權限（storage/unauthorized）";
  if(code.includes("storage/unauthenticated")) return "目前登入狀態無法通過 Storage 驗證（storage/unauthenticated）";
  if(code.includes("storage/object-not-found")) return "檔案路徑不存在（storage/object-not-found）";
  if(code.includes("storage/quota-exceeded")) return "Storage 額度已滿（storage/quota-exceeded）";
  if(code.includes("storage/retry-limit-exceeded")) return "上傳重試次數超過限制（storage/retry-limit-exceeded）";
  if(code.includes("storage/unknown")) return `Storage 未知錯誤（storage/unknown）${msg ? "：" + msg : ""}`;
  return `${code || "unknown"}${msg ? "：" + msg : ""}`;
}

async function uploadHandverPhoto(file){  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
  const safeExt = ext.replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `handover_photos/${effectiveStore()}/${state.selectedDate}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;

  let lastError = null;  for(const target of storageInstances){
    try{
      const photoRef = storageRef(target.instance, path);
      await uploadBytes(photoRef, file);      const url = await getDownloadURL(photoRef);      return url;
    }catch(error){
      console.error("Storage upload failed:", target.bucket, error);
      lastError = error;
    }
  }

  const fallbackRef = storageRef(storage, path);
  try{
    await uploadBytes(fallbackRef, file);    const url = await getDownloadURL(fallbackRef);    return url;
  }catch(error){
    console.error("Default storage upload failed:", error);
    lastError = error || lastError;
  }

  throw lastError || new Error("storage upload failed");
}

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.pendingApproval){
      await signOut(auth);
      setState({loginError:"此帳號正在等待管理員審核。", profile:null, currentUser:null});
      return;
    }
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    setState({ profile:{id:user.uid,...data,role:normalizeRole(data.role)} });
    subscribeData();
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"staff", storeId:firstUser?null:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  setState({ profile:{id:user.uid,...profile}, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為員工 寶慶。" });
  subscribeData();
}
function subscribeData(){
  clearSubs();
  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => setState({handovers:snap.docs.map(d=>({id:d.id,...d.data()}))})));
  unsubscribers.push(onSnapshot(collection(db,"announcements"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({ announcements:rows, lastAnnouncement:rows[0]||null, showAnnouncementModal:false });
  }));
  unsubscribers.push(onSnapshot(collection(db,"users"), snap => setState({users:snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)}))})));
  unsubscribers.push(onSnapshot(collection(db,"applications"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({applications:rows});
  }));
  unsubscribers.push(onSnapshot(collection(db,"stores"), async snap => {
    if(snap.empty){
      for(const s of storesSeed){
        await setDoc(doc(db,"stores",s.id), s, {merge:true});
      }
      setState({stores:storesSeed, storeDrafts:Object.fromEntries(storesSeed.map(s=>[s.id,s.name]))});
      return;
    }
    const rows = snap.docs.map(d => ({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    setState({stores:rows, storeDrafts:Object.fromEntries(rows.map(s=>[s.id,normalizeStoreName(s.id, s.name)]))});
  }));
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) return alert("找不到申請資料");
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

async function saveStore(id){
  if(!canManageStores()) return alert("只有管理員可修改店家資料");
  const idInput = document.getElementById(`store_id_${id}`);
  const nameInput = document.getElementById(`store_name_${id}`);
  const newId = String(idInput?.value || "").trim().toUpperCase();
  const newName = String(nameInput?.value || "").trim();
  if(!newId) return alert("請輸入店家代號");
  if(!/^[A-Z0-9_-]{1,12}$/.test(newId)) return alert("店家代號限英文大寫、數字、-、_，最多 12 碼");
  if(!newName) return alert("請輸入店別名稱");
  if(newId !== id && state.stores.some(s => String(s.id).toUpperCase()===newId)) return alert("此店家代號已存在");

  if(newId === id){
    await setDoc(doc(db,"stores",id),{id,name:newName},{merge:true});
    alert("店家資料已更新");
    return;
  }

  if(!confirm(`確定要把店家代號從 ${id} 改成 ${newId} 嗎？
天氣會同步更新交接資料、帳號店別與公告店別。`)) return;

  const oldStore = state.stores.find(s => s.id===id);
  await setDoc(doc(db,"stores",newId), {
    ...(oldStore || {}),
    id:newId,
    name:newName,
    updatedAt:serverTimestamp()
  }, {merge:true});

  const handoverSnap = await getDocs(collection(db,"handovers"));
  for(const row of handoverSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"handovers",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const userSnap = await getDocs(collection(db,"users"));
  for(const row of userSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"users",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const announcementSnap = await getDocs(collection(db,"announcements"));
  for(const row of announcementSnap.docs){
    const data = row.data();
    if(String(data.targetStoreId || "") === id){
      await updateDoc(doc(db,"announcements",row.id), {targetStoreId:newId, updatedAt:serverTimestamp()});
    }
  }

  await deleteDoc(doc(db,"stores",id));

  const patch = {selectedStore:newId, historyStore:newId};
  if(state.profile && String(state.profile.storeId || "") === id){
    state.profile.storeId = newId;
  }
  setState(patch);
  alert(`店家代號已由 ${id} 更新為 ${newId}`);
}

function isVideoAttachment(url="", mediaType="", mediaName=""){
  const type = String(mediaType || "").toLowerCase();
  const target = `${url || ""} ${mediaName || ""}`.toLowerCase();
  return type.startsWith("video/") || /\.(mp4|webm|mov|m4v|ogg)(\?|#|$|\s)/i.test(target);
}
function mediaListFromItem(item){
  const urls = Array.isArray(item?.photoUrls) && item.photoUrls.length ? item.photoUrls : (item?.photoUrl ? [item.photoUrl] : []);
  const names = Array.isArray(item?.photoNames) && item.photoNames.length ? item.photoNames : (item?.photoName ? [item.photoName] : []);
  const types = Array.isArray(item?.mediaTypes) && item.mediaTypes.length ? item.mediaTypes : (item?.mediaType ? [item.mediaType] : []);
  return urls.map((url,index) => ({
    url,
    name: names[index] || `交接媒體${index+1}`,
    type: types[index] || ""
  }));
}
function renderMediaAttachments(item, size=120){
  const list = mediaListFromItem(item);
  if(!list.length) return "";
  return `<div style="margin-top:10px"><div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-start">${list.map((media,index) => {
    const url = escapeHtml(media.url);
    const name = escapeHtml(media.name || `交接媒體${index+1}`);
    if(isVideoAttachment(media.url, media.type, media.name)){
      return `<div style="display:grid;gap:6px"><video src="${url}" controls playsinline preload="metadata" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border);background:#000"></video><a href="${url}" target="_blank" rel="noopener noreferrer" class="small" style="max-width:${size}px;word-break:break-all">開啟影片</a></div>`;
    }
    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="display:grid;gap:6px;text-decoration:none;color:inherit"><img src="${url}" alt="${name}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border)" onerror="this.style.display='none';this.parentElement.innerHTML='${isVideoAttachment(media.url, media.type, media.name) ? '開啟影片' : '開啟附件'}'"><div class="small muted" style="max-width:${size}px;word-break:break-all">${name}</div></a>`;
  }).join("")}</div></div>`;
}

function monthLabelFromDate(value){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return "";
  return `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}
function addMonths(value, diff){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return today();
  d.setMonth(d.getMonth()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.min(d.getDate(), 28)).padStart(2,"0")}`;
}
function hasUnfinishedOnDate(dateValue, storeId){
  const sid = storeId || effectiveStore();
  return state.handovers.some(h => h.date===dateValue && (!sid || h.storeId===sid) && h.status!=="done");
}
function calendarDateValue(year, month, day){
  return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function datePickerHtml(target, value, align="right"){
  if(state.openCalendar !== target) return "";
  const base = value ? new Date(value) : new Date();
  const d = Number.isNaN(base.getTime()) ? new Date() : base;
  const year = d.getFullYear();
  const month = d.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const days = [];
  for(let i=0;i<42;i++){
    const cur = new Date(start);
    cur.setDate(start.getDate()+i);
    const val = calendarDateValue(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const isOther = cur.getMonth() !== month;
    const isSelected = val === value;
    const unfinished = hasUnfinishedOnDate(val, target === "historyDate" ? state.historyStore : effectiveStore());
    days.push(`<button type="button" class="cal-day ${isOther?"other":""} ${unfinished?"unfinished":""} ${isSelected?"selected":""}" onclick="selectDateFromCalendar('${target}','${val}')">${cur.getDate()}</button>`);
  }
  return `<div class="date-calendar ${align==='left'?'left':''}">
    <div class="cal-head"><button type="button" class="cal-nav" onclick="moveCalendarMonth('${target}',-1)">‹</button><div>${monthLabelFromDate(value)}</div><button type="button" class="cal-nav" onclick="moveCalendarMonth('${target}',1)">›</button></div>
    <div class="cal-week"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
    <div class="cal-days">${days.join("")}</div>
    <div class="cal-legend"><span><span class="cal-dot-red"></span>有未完成事項</span><button type="button" class="btn secondary" style="padding:6px 10px;border-radius:10px" onclick="selectDateFromCalendar('${target}','${today()}')">今天</button></div>
  </div>`;
}
function dateInputHtml(id, value, cls="w180", align="right"){
  return `<span class="date-wrap"><input class="${cls}" type="date" id="${id}" value="${escapeHtml(value)}" onclick="openDateCalendarFromUI('${id}')" onfocus="openDateCalendarFromUI('${id}')">${datePickerHtml(id, value, align)}</span>`;
}


function ymFromDate(value){
  const v = String(value || today());
  return /^\d{4}-\d{2}/.test(v) ? v.slice(0,7) : today().slice(0,7);
}
function daysInMonthFromYM(ym){
  const [y,m] = String(ym || ymFromDate(today())).split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function buildDateFromYMDay(ym, day){
  return `${ym}-${String(day).padStart(2,"0")}`;
}
function monthDateSelectorHtml(value){
  const selected = String(value || today());
  const ym = ymFromDate(selected);
  const days = daysInMonthFromYM(ym);
  const buttons = Array.from({length:days}, (_, idx) => {
    const day = idx + 1;
    const date = buildDateFromYMDay(ym, day);
    const d = new Date(date + "T00:00:00");
    const active = date === selected;
    return `<button type="button" class="month-day-btn ${active ? "active" : ""}" onclick="selectMonthDayFromUI('${date}')"><span>${day}</span></button>`;
  }).join("");
  return `<div class="month-date-panel">
    <div class="month-picker-box">
      <div class="month-picker-main"><label for="newItemMonth">交接年月</label><input id="newItemMonth" type="month" value="${escapeHtml(ym)}"></div>
    </div>
    <div class="month-days-strip" aria-label="整月日期快速選擇">${buttons}</div>
  </div>`;
}

  const appMap = new Map();
  (state.applications || []).forEach(app => {
    if(app?.id) appMap.set(String(app.id), {id:String(app.id), ...app});
  });
  (state.users || []).forEach(user => {
    const isPending = user?.pendingApproval || user?.applicationStatus === "pending";
    if(!user?.id || !isPending) return;
    if(appMap.has(String(user.id))) return;
    appMap.set(String(user.id), {
      id: String(user.id),
      uid: String(user.id),
      email: user.email || user.username || "",
      name: user.name || "",
      status: user.applicationStatus || "pending",
      createdAt: user.createdAt || user.updatedAt || null,
      updatedAt: user.updatedAt || user.createdAt || null,
      reviewedByName: user.reviewedByName || "",
      fallbackFromUsers: true
    });
  });
  return Array.from(appMap.values()).sort((a,b) => {
    const aSec = Number(a?.updatedAt?.seconds || a?.createdAt?.seconds || 0);
    const bSec = Number(b?.updatedAt?.seconds || b?.createdAt?.seconds || 0);
    return bSec - aSec;
  });
}

    requestAnimationFrame(() => {

      s.focus();
      try{
        if(start !== null && end !== null) s.setSelectionRange(start, end);
      }catch(err){}

    if(el){ el.scrollIntoView({behavior:"smooth", block:"center"}); }
  });
  setTimeout(() => {
    if(state.focusedItemId === id){ setState({focusedItemId:null}); }
  }, 3000);
}

  const item = state.handovers.find(row => row.id === id);

  setState({
    tab:"forms",
    selectedDate:item.date || state.selectedDate,
    newItemDate:item.date || state.newItemDate,
    selectedStore:item.storeId || effectiveStore(),
    selectedShift:item.shift || "",

}

window.cancelEditItem = () => setState({editingItemId:null,editingItemContent:""});
window.saveEditItemFromUI = saveEditItem;
window.disableUserFromUI = disableUser;
window.sendUserPasswordResetFromUI = sendUserPasswordReset;
window.addStoreFromUI = addStore;
window.saveStoreFromUI = saveStore;
window.reviewApplicationFromUI = reviewApplication;
window.refreshWeatherFromUI = () => refreshWeather(false);
window.refreshWeatherByLocationFromUI = () => refreshWeather(true);
window.scrollToLoginSection = scrollToLoginSection;
window.openSecureLayerFromUI = () => setState({publicGateStage:1});
window.openSecureLoginFromUI = () => setState({publicGateStage:2});
window.closeSecureLoginFromUI = () => setState({publicGateStage:0,loginError:"",applicationError:""});
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      if (window.caches && caches.keys) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      console.log("舊快取已清除");
    } catch (e) {
      console.log("清除快取失敗", e);
    }
  });
}

onAuthStateChanged(auth, async user => {
  clearSubs();
  if(user){
    setState({currentUser:user,authReady:true});
    await ensureProfile(user);
  }else{
    resetPendingPhoto();
    setState({currentUser:null,profile:null,authReady:true,users:[],applications:[],handovers:[],announcements:[],showAnnouncementModal:false,publicGateStage:0});
  }
});

render();
</script>
